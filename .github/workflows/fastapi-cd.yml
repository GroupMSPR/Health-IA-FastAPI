# ============================================================================
#  CD — FastAPI (API IAs)
# ============================================================================

name: CD Python FastAPI (Build, Tag, Push GHCR)

on:
  push:
    branches: [master]
    tags:    ["v*.*.*"]

env:
  IMAGE: ghcr.io/groupmspr/health-ia-fastapi

jobs:
  build-and-push:
    name: Build & Push image Docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=ref,event=branch
          labels: |
            org.opencontainers.image.description=MSPR FastAPI IA HealthAI Coach - Ilan - Anthony - Diana

      # ------------------------------------------------------------------
      #    ⚠️ le CMD contient --reload (pour dev local).
      #    Pour la prod il faut le retirer du Dockerfile - surcharge
      # ------------------------------------------------------------------
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
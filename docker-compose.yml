services:
  healthai-ia:
    build: .
    container_name: healthai_fastapi
    ports:
      - "4000:4000"
    volumes:
      - ./app:/code/app  # dev
      - ./docker-volumes:/code/data # sauvegarde/persistance
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MONGO_URI=${MONGO_URI:-mongodb://root:example@mongodb:27017/}
    depends_on:
      - ollama
      - mongodb
    restart: always
  
  ollama:
    image: ollama/ollama:latest
    container_name: healthai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-models:/root/.ollama
    restart: always

    # decommente 'deploy' si tu as une gpu nvidia et wsl2
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
  
  mongodb:
    image: mongo:latest
    container_name: healthai_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
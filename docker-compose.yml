services:
  healthai-ia:
    build: .
    container_name: healthai_fastapi
    ports:
      - "4000:4000"
    volumes:
      - ./app:/code/app  # dev
      - ./docker-volumes:/code/data # sauvegarde/persistance
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: always
  
  ollama:
    image: ollama/ollama:latest
    container_name: healthai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-models:/root/.ollama
    restart: always

    # decommente 'deploy' si tu as une gpu nvidia et wsl2
